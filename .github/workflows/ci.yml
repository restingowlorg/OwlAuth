name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - develop
      - staging
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-checks:
    name: PR Checks (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node:
          - 20.x
          - 22.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm install

      - name: Check formatting
        run: npm run format:check

      - name: Detect merge conflict markers
        run: |
          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- . ':!package-lock.json'; then
            echo "Merge conflict markers detected. Resolve them before merge."
            exit 1
          fi

      - name: Lint code
        run: npm run lint -- --max-warnings=0

      - name: Type check
        run: npm run typecheck

      - name: Build library
        run: npm run build

      - name: Detect test script
        id: detect-test
        run: |
          TEST_SCRIPT=$(node -e "const p=require('./package.json'); process.stdout.write((p.scripts&&p.scripts.test)||'')")
          if [ -z "$TEST_SCRIPT" ] || [ "$TEST_SCRIPT" = "echo \"Error: no test specified\" && exit 1" ]; then
            echo "has_test=false" >> "$GITHUB_OUTPUT"
            echo "No real test script configured. Skipping test step."
          else
            echo "has_test=true" >> "$GITHUB_OUTPUT"
            echo "Detected test script: $TEST_SCRIPT"
          fi

      - name: Run tests
        if: steps.detect-test.outputs.has_test == 'true' && matrix.node == '20.x'
        run: npm test
