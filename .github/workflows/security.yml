name: Security

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - develop
      - staging
      - main
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check dependency review availability
        id: dep_review_support
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: repo } = await github.rest.repos.get({
                owner: context.repo.owner,
                repo: context.repo.repo
              });

              const security = repo.security_and_analysis || {};
              const dependencyGraph = security.dependency_graph?.status === 'enabled';
              const advancedSecurity = security.advanced_security?.status === 'enabled';
              const supported = dependencyGraph && (!repo.private || advancedSecurity);

              core.setOutput('supported', supported ? 'true' : 'false');

              if (!supported) {
                core.notice(
                  `Skipping dependency review: dependency_graph=${dependencyGraph}, ` +
                  `advanced_security=${advancedSecurity}, private_repo=${repo.private}`
                );
              }
            } catch (error) {
              core.notice(`Skipping dependency review: could not verify repository security settings (${error.message}).`);
              core.setOutput('supported', 'false');
            }

      - name: Review dependency changes
        if: ${{ steps.dep_review_support.outputs.supported == 'true' }}
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Dependency review skipped
        if: ${{ steps.dep_review_support.outputs.supported != 'true' }}
        run: echo "Dependency review is not available for this repository/token context. Skipping without failing the workflow."

  runtime-security:
    name: Secret Scan and Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm install

      - name: Secret scan tracked files
        run: git ls-files -z | xargs -0 npx secretlint

      - name: Dependency vulnerability audit
        run: npm audit --omit=dev --audit-level=high
