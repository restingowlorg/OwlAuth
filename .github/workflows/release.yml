name: Release

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Choose prerelease for staging/next or stable for main/latest"
        required: true
        default: prerelease
        type: choice
        options:
          - prerelease
          - stable
  push:
    branches:
      - main
      - chore/add-release-changeset-for-v1.1.0

concurrency:
  group: release-${{ github.ref }}-${{ github.event_name }}-${{ inputs.release_mode || 'stable' }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Determine release mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.release_mode }}" = "prerelease" ]; then
            echo "mode=prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "mode=stable" >> "$GITHUB_OUTPUT"
          fi
      - name: Show release context
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "Mode: ${{ steps.mode.outputs.mode }}"
      - name: Force OIDC trusted publishing
        run: |
          echo "NODE_AUTH_TOKEN=" >> "$GITHUB_ENV"
          echo "NPM_TOKEN=" >> "$GITHUB_ENV"

      - name: Verify trusted publishing runtime
        run: |
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          node -e 'const [major, minor] = process.versions.node.split(".").map(Number); if (major < 22 || (major === 22 && minor < 14)) { console.error("npm trusted publishing requires Node 22.14.0 or later."); process.exit(1); }'

      - name: Install dependencies
        run: npm ci

      - name: Validate release quality gates
        run: npm run release:validate

      - name: Create npm package artifact
        run: npm pack --json > pack-output.json

      - name: Smoke test npm package artifact
        run: |
          PACK_FILE=$(node -e 'const fs=require("fs");const out=JSON.parse(fs.readFileSync("pack-output.json","utf8"));process.stdout.write(out[0].filename)')
          TMP_DIR=$(mktemp -d)
          cd "$TMP_DIR"
          npm init -y >/dev/null 2>&1
          npm install "$GITHUB_WORKSPACE/$PACK_FILE"
          node -e 'require("@restingowlorg/owlauth-release-test"); require("@restingowlorg/owlauth-release-test/mongo"); require("@restingowlorg/owlauth-release-test/postgres"); console.log("artifact smoke test passed")'
      - name: Enter prerelease mode and version packages
        if: steps.mode.outputs.mode == 'prerelease'
        run: |
          if [ ! -f ".changeset/pre.json" ]; then
            npx changeset pre enter next
          fi
          npm run version-packages
      - name: Verify OIDC trusted publishing is in use
        run: |
          if [ -n "${NODE_AUTH_TOKEN}" ]; then
            echo "Unexpected NODE_AUTH_TOKEN detected. Remove NPM_TOKEN/NODE_AUTH_TOKEN secrets to use npm trusted publishing." >&2
            exit 1
          fi
      - name: Publish prerelease to next tag
        if: steps.mode.outputs.mode == 'prerelease'
        uses: changesets/action@v1
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""

      - name: Exit prerelease mode for stable release
        if: steps.mode.outputs.mode == 'stable'
        run: |
          if [ -f ".changeset/pre.json" ]; then
            npx changeset pre exit
          fi
      - name: Create release pull request or publish
        if: steps.mode.outputs.mode == 'stable'
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""
