name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - chore/release-workflow-improvements # temp: remove before merging to main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate release quality gates
        run: npm run release:validate

      - name: Create npm package artifact
        run: npm pack --json > pack-output.json

      - name: Smoke test npm package artifact
        run: |
          PACK_FILE=$(node -e 'const fs=require("fs");const out=JSON.parse(fs.readFileSync("pack-output.json","utf8"));process.stdout.write(out[0].filename)')
          TMP_DIR=$(mktemp -d)
          cd "$TMP_DIR"
          npm init -y >/dev/null 2>&1
          npm install "$GITHUB_WORKSPACE/$PACK_FILE"
          node -e 'require("@restingowlorg/owlauthtest"); require("@restingowlorg/owlauthtest/mongo"); require("@restingowlorg/owlauthtest/postgres"); console.log("artifact smoke test passed")'

      - name: Configure npm token fallback
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "NODE_AUTH_TOKEN=$NPM_TOKEN" >> "$GITHUB_ENV"
          fi

      - name: Exit prerelease mode for stable release
        run: |
          if [ -f ".changeset/pre.json" ]; then
            npx changeset pre exit
          fi

      - name: Create release pull request or publish
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
